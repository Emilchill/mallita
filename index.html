<title>Malla Curricular ISC - UTESA</title>
<style>
  :root{
    --bg:#0f1420;
    --card:#161d2e;
    --card-border:#242d42;
    --text:#e7ecf5;
    --muted:#8b95ab;
    --approved:#1f8a4c;
    --approved-border:#2fbf6b;
    --unlocked:#1c2740;
    --unlocked-border:#3a5a9e;
    --locked:#141924;
    --locked-border:#242c3d;
    --accent:#4d8dff;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:linear-gradient(180deg,#0b0f18,#0f1420 300px);
    color:var(--text);
    padding-bottom:60px;
  }
  header{
    padding:28px 20px 18px;
    text-align:center;
    border-bottom:1px solid var(--card-border);
    position:sticky;
    top:0;
    background:rgba(15,20,32,0.92);
    backdrop-filter:blur(8px);
    z-index:50;
  }
  header h1{margin:0 0 4px;font-size:1.4rem;}
  header p{margin:0;color:var(--muted);font-size:0.85rem;}
  #status{
    font-size:0.75rem;
    margin-top:8px;
    color:var(--muted);
  }
  #progressWrap{
    max-width:700px;
    margin:14px auto 0;
    padding:0 20px;
  }
  #progressBarBg{
    background:var(--locked);
    border-radius:20px;
    height:10px;
    overflow:hidden;
    border:1px solid var(--card-border);
  }
  #progressBarFill{
    height:100%;
    background:linear-gradient(90deg,var(--accent),var(--approved-border));
    width:0%;
    transition:width .4s ease;
  }
  #progressText{
    text-align:center;
    font-size:0.75rem;
    color:var(--muted);
    margin-top:6px;
  }
  .container{
    max-width:1400px;
    margin:0 auto;
    padding:20px;
    display:flex;
    gap:16px;
    overflow-x:auto;
  }
  .cuatrimestre{
    min-width:230px;
    flex:1 0 230px;
  }
  .cuatrimestre h2{
    font-size:0.85rem;
    text-align:center;
    color:var(--muted);
    margin:0 0 10px;
    text-transform:uppercase;
    letter-spacing:0.5px;
  }
  .materia{
    background:var(--locked);
    border:1px solid var(--locked-border);
    border-radius:10px;
    padding:10px 12px;
    margin-bottom:10px;
    cursor:pointer;
    transition:all .15s ease;
    user-select:none;
    position:relative;
  }
  .materia:hover{transform:translateY(-2px);}
  .materia.locked{opacity:0.45;cursor:not-allowed;}
  .materia.locked:hover{transform:none;}
  .materia.unlocked{
    background:var(--unlocked);
    border-color:var(--unlocked-border);
  }
  .materia.approved{
    background:var(--approved);
    border-color:var(--approved-border);
  }
  .materia .clave{
    font-size:0.7rem;
    color:var(--muted);
    font-weight:600;
  }
  .materia.approved .clave{color:#d5f5e3;}
  .materia .nombre{
    font-size:0.8rem;
    font-weight:600;
    margin:2px 0 4px;
    line-height:1.25;
  }
  .materia .cred{
    font-size:0.68rem;
    color:var(--muted);
  }
  .materia.approved .cred{color:#d5f5e3;}
  .check{
    position:absolute;
    top:8px;
    right:8px;
    font-size:0.85rem;
  }
  .legend{
    display:flex;
    justify-content:center;
    gap:18px;
    flex-wrap:wrap;
    padding:14px 20px 0;
    font-size:0.75rem;
    color:var(--muted);
  }
  .legend span{display:flex;align-items:center;gap:6px;}
  .dot{width:12px;height:12px;border-radius:3px;display:inline-block;}
  .dot.locked{background:var(--locked);border:1px solid var(--locked-border);}
  .dot.unlocked{background:var(--unlocked);border:1px solid var(--unlocked-border);}
  .dot.approved{background:var(--approved);border:1px solid var(--approved-border);}
  #resetBtn{
    display:block;
    margin:24px auto 0;
    background:none;
    border:1px solid #6e2e2e;
    color:#e08a8a;
    padding:8px 16px;
    border-radius:8px;
    font-size:0.78rem;
    cursor:pointer;
  }
  #resetBtn:hover{background:#2a1414;}
  .tooltip{
    font-size:0.68rem;
    color:var(--muted);
    margin-top:4px;
    line-height:1.3;
  }
  @media (max-width:700px){
    .container{flex-direction:column;}
    .cuatrimestre{min-width:100%;}
  }

// Claves especiales de "aprobar todo hasta cuatrimestre X"
function clavesHasta(n){
  let out = [];
  malla.forEach(c=>{
    if(c.cuatrimestre>=1 && c.cuatrimestre<=n){
      c.materias.forEach(m=>out.push(m.clave));
    }
  });
  return out;
}

const allMaterias = [];
malla.forEach(c=>c.materias.forEach(m=>allMaterias.push(m)));

let approved = new Set();

function isUnlocked(materia){
  if(approved.has(materia.clave)) return true;
  if(materia.prereq.length===0) return true;
  for(const p of materia.prereq){
    if(p==="_hasta5"){ if(!clavesHasta(5).every(c=>approved.has(c))) return false; continue; }
    if(p==="_hasta7"){ if(!clavesHasta(7).every(c=>approved.has(c))) return false; continue; }
    if(p==="_hasta9"){ if(!clavesHasta(9).every(c=>approved.has(c))) return false; continue; }
    if(p==="_hasta11"){ if(!clavesHasta(11).every(c=>approved.has(c))) return false; continue; }
    if(!approved.has(p)) return false;
  }
  return true;
}

function render(){
  const container = document.getElementById("mallaContainer");
  container.innerHTML = "";
  malla.forEach(c=>{
    const col = document.createElement("div");
    col.className = "cuatrimestre";
    const title = document.createElement("h2");
    title.textContent = c.nombre_especial ? c.nombre_especial : `Cuatrimestre ${c.cuatrimestre}`;
    col.appendChild(title);
    c.materias.forEach(m=>{
      const div = document.createElement("div");
      const unlocked = isUnlocked(m);
      const isApproved = approved.has(m.clave);
      div.className = "materia " + (isApproved ? "approved" : (unlocked ? "unlocked" : "locked"));
      div.innerHTML = `
        <div class="clave">${m.clave}</div>
        <div class="nombre">${m.nombre}</div>
        <div class="cred">${m.cred} créditos</div>
        ${isApproved ? '<span class="check">✅</span>' : ''}
      `;
      div.addEventListener("click", ()=>{
        if(!unlocked && !isApproved) return;
        toggleMateria(m.clave);
      });
      col.appendChild(div);
    });
    container.appendChild(col);
  });
  updateProgress();
}

function updateProgress(){
  const totalCred = allMaterias.reduce((a,m)=>a+m.cred,0);
  const doneCred = allMaterias.filter(m=>approved.has(m.clave)).reduce((a,m)=>a+m.cred,0);
  const pct = totalCred ? Math.round((doneCred/totalCred)*100) : 0;
  document.getElementById("progressBarFill").style.width = pct + "%";
  document.getElementById("progressText").textContent = `${doneCred} / ${totalCred} créditos aprobados (${pct}%)`;
}

function toggleMateria(clave){
  if(approved.has(clave)) approved.delete(clave);
  else approved.add(clave);
  saveProgress();
  render();
}

// ============================================
// PERSISTENCIA: Firebase si está configurado, si no localStorage
// ============================================
async function loadProgress(){
  if(firebaseReady){
    try{
      const snap = await getDoc(doc(db,"progreso",userId));
      if(snap.exists()){
        approved = new Set(snap.data().materias || []);
      }
    }catch(e){ console.error(e); }
  } else {
    const raw = localStorage.getItem("malla_progreso");
    approved = new Set(raw ? JSON.parse(raw) : []);
  }
  render();
}

async function saveProgress(){
  if(firebaseReady){
    try{
      await setDoc(doc(db,"progreso",userId), { materias: Array.from(approved), actualizado: new Date().toISOString() });
    }catch(e){ console.error(e); }
  } else {
    localStorage.setItem("malla_progreso", JSON.stringify(Array.from(approved)));
  }
}

document.getElementById("resetBtn").addEventListener("click", ()=>{
  if(confirm("¿Seguro que quieres borrar todo tu progreso?")){
    approved = new Set();
    saveProgress();
    render();
  }
});

// ============================================
// INICIO
// ============================================
if(firebaseReady){
  onAuthStateChanged(auth, async (user)=>{
    if(user){
      userId = user.uid;
      document.getElementById("status").textContent = "✅ Conectado — guardando tu progreso automáticamente";
      await loadProgress();
    } else {
      signInAnonymously(auth).catch(err=>{
        console.error(err);
        document.getElementById("status").textContent = "⚠️ Error conectando a Firebase, usando almacenamiento local";
        firebaseReady = false;
        loadProgress();
      });
    }
  });
} else {
  document.getElementById("status").textContent = "💾 Guardando localmente en este navegador";
  loadProgress();
}
